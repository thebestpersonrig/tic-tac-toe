<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>

  <style>
  :root {
    --board-max: min(78vw, 58vh, 340px);
    --cell-gap: 12px;
    --cell-size: calc((var(--board-max) - (var(--cell-gap) * 2)) / 3);
    --title-size: clamp(1.8rem, 4vw, 2.5rem);
    --status-size: clamp(1rem, 2.5vw, 1.25rem);
  }

  * {
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    margin: 0;
    padding: 10px 14px 14px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
  }

  h1 {
    font-size: var(--title-size);
    margin: 0 0 4px;
    line-height: 1.1;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }

  #subtitle {
    font-size: clamp(0.9rem, 2vw, 1.05rem);
    margin: 0 0 10px;
    opacity: 0.9;
    min-height: 1.2em;
  }

  .mode {
    margin: 6px 0 10px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    width: 100%;
  }

  .mode label {
    background: rgba(255, 255, 255, 0.12);
    padding: 7px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.3s;
    font-size: 0.95rem;
    white-space: nowrap;
  }

  .mode label:hover {
    background: rgba(255, 255, 255, 0.2);
  }

  #status {
    font-size: var(--status-size);
    margin: 4px 0 10px;
    min-height: 1.4em;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, var(--cell-size));
    gap: var(--cell-gap);
    justify-content: center;
    margin: 8px 0 10px;
  }

  button.cell {
    width: var(--cell-size);
    height: var(--cell-size);
    font-size: calc(var(--cell-size) * 0.42);
    background: rgba(255, 255, 255, 0.92);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transition: all 0.25s ease;
    color: #333;
    font-weight: bold;
    -webkit-tap-highlight-color: transparent;
  }

  button.cell:hover:not(:disabled) {
    transform: translateY(-3px);
    box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    background: rgba(255, 255, 255, 1);
  }

  button.cell:disabled {
    color: #333;
    cursor: not-allowed;
  }

  .controls {
    margin-top: 4px;
  }

  .controls button {
    background: #4CAF50;
    color: white;
    border: none;
    padding: 10px 20px;
    font-size: 1rem;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transition: all 0.25s ease;
  }

  .controls button:hover {
    background: #45a049;
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
  }

  @media (max-width: 900px) {
    :root {
      --board-max: min(82vw, 54vh, 320px);
      --cell-gap: 10px;
    }

    body {
      padding: 12px 16px 18px;
      justify-content: center;
    }
  }

  @media (max-width: 600px) {
    :root {
      --board-max: min(88vw, 50vh, 300px);
      --cell-gap: 8px;
    }

    body {
      padding: 8px 10px 12px;
      justify-content: center;
    }

    h1 {
      margin-bottom: 2px;
    }

    #subtitle {
      margin-bottom: 8px;
      font-size: 0.92rem;
    }

    .mode {
      gap: 8px;
      margin: 4px 0 8px;
    }

    .mode label {
      font-size: 0.88rem;
      padding: 6px 10px;
    }

    #status {
      margin: 2px 0 8px;
      font-size: 1rem;
    }

    .controls button {
      padding: 8px 16px;
      font-size: 0.95rem;
    }
  }

  @media (max-height: 760px) {
    :root {
      --board-max: min(82vw, 46vh, 280px);
    }

    body {
      justify-content: center;
      padding-top: 6px;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2rem);
    }

    #subtitle {
      margin-bottom: 6px;
    }

    .mode {
      margin: 4px 0 6px;
    }

    #status {
      margin: 2px 0 6px;
    }

    .grid {
      margin: 6px 0 8px;
    }
  }

  @media (max-width: 380px) {
    :root {
      --board-max: min(92vw, 44vh, 260px);
      --cell-gap: 7px;
    }

    .mode {
      flex-direction: column;
      align-items: center;
    }

    .mode label {
      width: min(220px, 90%);
    }
  }

  @media (max-height: 640px) {
    :root {
      --board-max: min(78vw, 40vh, 240px);
    }

    body {
      justify-content: flex-start;
    }

    h1 {
      margin-bottom: 0;
    }

    #subtitle {
      display: none;
    }

    .mode {
      margin: 4px 0;
    }

    #status {
      min-height: 1.2em;
      margin: 2px 0 6px;
    }

    .controls {
      margin-top: 2px;
    }
  }
</style>

</head>

<body>

<h1>Tic-Tac-Toe</h1>

<p id="subtitle"></p>

<div class="mode">
  <label><input type="radio" name="mode" value="single" checked> Single Player</label>
  <label><input type="radio" name="mode" value="multi"> Multiplayer</label>
</div>

<p id="status"></p>

<div class="grid" id="grid"></div>

<div class="controls">
  <button onclick="resetGame()">Restart</button>
</div>

<script>
let board, gameOver, currentSymbol, mode;

const WINNING_LINES = [
 [0,1,2],[3,4,5],[6,7,8],
 [0,3,6],[1,4,7],[2,5,8],
 [0,4,8],[2,4,6]
];

function availableMoves() {
  return board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
}

function checkWinner() {
  for (let [a,b,c] of WINNING_LINES) {
    if (board[a] && board[a]===board[b] && board[a]===board[c]) return board[a];
  }
  if (!availableMoves().length) return "Tie";
  return null;
}


function minimax(isComputer, depth = 0) {
  let result = checkWinner();

  if (result === "O") return [10 - depth, null];
  if (result === "X") return [depth - 10, null];
  if (result === "Tie") return [0, null];

  let bestMove = null;

  if (isComputer) {
    let bestScore = -Infinity;

    for (let move of availableMoves()) {
      board[move] = "O";
      let [score] = minimax(false, depth + 1);
      board[move] = "";

      if (score > bestScore) {
        bestScore = score;
        bestMove = move;
      }
    }

    return [bestScore, bestMove];
  } else {
    let bestScore = Infinity;

    for (let move of availableMoves()) {
      board[move] = "X";
      let [score] = minimax(true, depth + 1);
      board[move] = "";

      if (score < bestScore) {
        bestScore = score;
        bestMove = move;
      }
    }

    return [bestScore, bestMove];
  }
}


let buttons=[];

function makeMove(i,symbol){
  board[i]=symbol;
  buttons[i].innerText=symbol;
  buttons[i].disabled=true;
}

function playerMove(i){
  if (gameOver || board[i]) return;

  makeMove(i,currentSymbol);

  let result=checkWinner();
  if (finishGame(result)) return;

  if (mode==="single"){
    currentSymbol="O";
    setStatus("Computer thinking...");
    disableOpen();

    setTimeout(()=>{
      let [,move]=minimax(true);
      makeMove(move,"O");

      let result=checkWinner();
      if (finishGame(result)) return;

      currentSymbol="X";
      enableOpen();
      setStatus("Your turn. You are X.");
    },300);

  } else {
    currentSymbol = currentSymbol==="X"?"O":"X";
    setStatus("Player "+currentSymbol+"'s turn.");
  }
}

function finishGame(result){
  if (!result) return false;

  gameOver=true;
  disableOpen();

  if (result==="Tie"){
    setStatus("It's a tie.");
  } else {
    highlight(result);
    if (mode==="multi"){
      setStatus("Player "+result+" wins.");
    } else if (result==="X"){
      setStatus("You win.");
    } else {
      setStatus("Computer wins.");
    }
  }
  return true;
}

function highlight(winner){
  for (let [a,b,c] of WINNING_LINES){
    if (board[a]===board[b] && board[a]===board[c] && board[a]===winner){
      [a,b,c].forEach(i=>buttons[i].style.background="#d8c58b");
      return;
    }
  }
}

function disableOpen(){
  buttons.forEach((b,i)=>{ if(!board[i]) b.disabled=true; });
}

function enableOpen(){
  buttons.forEach((b,i)=>{ if(!board[i]) b.disabled=false; });
}

function setStatus(text){
  document.getElementById("status").innerText=text;
}

function updateMode(){
  mode=document.querySelector('input[name="mode"]:checked').value;

  if (mode==="single"){
    document.getElementById("subtitle").innerText="Single player vs computer";
    setStatus("Your turn. You are X.");
  } else {
    document.getElementById("subtitle").innerText="Multiplayer";
    setStatus("Player X's turn.");
  }
}

function resetGame(){
  board=["","","","","","","","",""];
  gameOver=false;
  currentSymbol="X";

  buttons.forEach(b=>{
    b.innerText="";
    b.disabled=false;
    b.style.background="#fffaf2";
  });

  updateMode();
}

let grid=document.getElementById("grid");

for(let i=0;i<9;i++){
  let btn=document.createElement("button");
  btn.className="cell";
  btn.onclick=()=>playerMove(i);
  grid.appendChild(btn);
  buttons.push(btn);
}

document.querySelectorAll('input[name="mode"]').forEach(r=>{
  r.addEventListener("change",resetGame);
});

resetGame();
</script>

</body>
</html>
