<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tic Tac Toe</title>

  <style>
    :root {
      --bg-1: #5b7cfa;
      --bg-2: #7d4fd4;
      --panel: rgba(255, 255, 255, 0.12);
      --text: #ffffff;
      --text-dark: #23304a;
      --muted: rgba(255, 255, 255, 0.82);
      --button: #49b96e;
      --button-hover: #3ca35f;
      --accent: #ffd166;
      --radius: 22px;
      --shadow: 0 18px 40px rgba(12, 20, 44, 0.26);

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      --app-width: min(100vw - 20px, 560px);
      --app-height: min(100dvh - 20px - var(--safe-top) - var(--safe-bottom), 920px);

      --title-size: clamp(1.5rem, 3.4vw, 2.7rem);
      --subtitle-size: clamp(0.82rem, 1.8vw, 0.98rem);
      --meta-size: clamp(0.8rem, 1.7vw, 0.92rem);
      --status-size: clamp(0.95rem, 2vw, 1.15rem);
      --control-size: clamp(0.88rem, 1.8vw, 0.98rem);

      --section-gap: clamp(8px, 1.4vh, 14px);
      --inner-pad: clamp(10px, 1.8vh, 18px);
      --grid-gap: clamp(7px, 1vh, 12px);

      --board-max: min(84vw, 42vh, 340px);
      --cell-size: calc((var(--board-max) - (var(--grid-gap) * 2)) / 3);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.18), transparent 26%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.12), transparent 22%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding:
        max(10px, var(--safe-top))
        10px
        max(10px, var(--safe-bottom));
      overflow: hidden;
    }

    .app {
      width: var(--app-width);
      height: var(--app-height);
      max-width: 100%;
      max-height: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .screen {
      position: absolute;
      inset: 0;
      padding: var(--inner-pad);
      display: flex;
      flex-direction: column;
      gap: var(--section-gap);
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 0.22s ease, transform 0.22s ease;
      min-height: 0;
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .setup-screen {
      justify-content: center;
    }

    .game-screen {
      display: grid;
      grid-template-rows: auto auto auto auto minmax(0, 1fr) auto auto;
      align-content: stretch;
    }

    .top,
    .game-header {
      display: grid;
      gap: min(8px, 1vh);
      text-align: center;
    }

    h1,
    .game-title {
      margin: 0;
      line-height: 1.05;
      letter-spacing: 0.02em;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.22);
    }

    h1 {
      font-size: var(--title-size);
    }

    .game-title {
      font-size: clamp(1.3rem, 2.8vw, 2rem);
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: var(--subtitle-size);
      line-height: 1.3;
    }

    .meta {
      color: var(--muted);
      font-size: var(--meta-size);
      min-height: 1.2em;
      line-height: 1.25;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      padding: clamp(10px, 1.7vh, 14px);
    }

    .options {
      display: grid;
      gap: clamp(10px, 1.4vh, 12px);
    }

    .option-row {
      display: grid;
      gap: 8px;
    }

    .option-label {
      font-size: clamp(0.84rem, 1.6vw, 0.9rem);
      color: var(--muted);
    }

    .segmented {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .segmented input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .segmented label {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.12);
      cursor: pointer;
      font-size: var(--control-size);
      transition: 0.18s ease;
      user-select: none;
      touch-action: manipulation;
      text-align: center;
      flex: 1 1 auto;
      min-width: 110px;
    }

    .segmented label:hover {
      background: rgba(255, 255, 255, 0.16);
      transform: translateY(-1px);
    }

    .segmented input:checked + label {
      background: rgba(255, 255, 255, 0.95);
      color: var(--text-dark);
      border-color: transparent;
      font-weight: 700;
    }

    .primary-action,
    .controls button,
    .postgame-actions button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: var(--control-size);
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
      touch-action: manipulation;
      box-shadow: 0 8px 18px rgba(20, 26, 48, 0.18);
    }

    .primary-action {
      width: 100%;
      background: var(--button);
      color: white;
    }

    .primary-action:hover,
    .btn-primary:hover,
    .postgame-actions .btn-primary:hover {
      background: var(--button-hover);
      transform: translateY(-2px);
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .score-card {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 8px;
      text-align: center;
    }

    .score-card div {
      font-size: clamp(0.78rem, 1.5vw, 0.9rem);
      line-height: 1.2;
    }

    .score-card strong {
      display: block;
      font-size: clamp(1.05rem, 2.1vw, 1.28rem);
      margin-top: 4px;
    }

    .micro-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .micro-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 8px 10px;
      text-align: center;
      font-size: clamp(0.78rem, 1.5vw, 0.9rem);
    }

    .status {
      min-height: 1.35em;
      text-align: center;
      font-size: var(--status-size);
      font-weight: 700;
      margin: 0;
      line-height: 1.25;
    }

    .thinking {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dots {
      display: inline-flex;
      gap: 4px;
      vertical-align: middle;
    }

    .dots span {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.35;
      animation: blink 1.1s infinite;
    }

    .dots span:nth-child(2) {
      animation-delay: 0.18s;
    }

    .dots span:nth-child(3) {
      animation-delay: 0.36s;
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.35; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-2px); }
    }

    .board-area {
      min-height: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 2px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, var(--cell-size));
      gap: var(--grid-gap);
      max-width: 100%;
      max-height: 100%;
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      border: none;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--text-dark);
      font-size: calc(var(--cell-size) * 0.42);
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(16, 24, 48, 0.18);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .cell:hover:not(:disabled),
    .cell:focus-visible:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 14px 28px rgba(16, 24, 48, 0.26);
      background: #ffffff;
      outline: none;
    }

    .cell:disabled {
      cursor: not-allowed;
    }

    .cell.x {
      color: #4961d6;
    }

    .cell.o {
      color: #da5f7a;
    }

    .cell.winning {
      background: linear-gradient(135deg, #ffe38a, #ffd166);
      animation: pulse 0.7s ease-in-out infinite alternate;
    }

    .controls,
    .postgame-actions {
      display: grid;
      gap: 8px;
      padding-top: 2px;
    }

    .btn-primary {
      background: var(--button);
      color: white;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.94);
      color: var(--text-dark);
    }

    .btn-tertiary {
      background: rgba(255, 255, 255, 0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.14);
    }

    .btn-secondary:hover,
    .btn-tertiary:hover {
      transform: translateY(-2px);
    }

    .postgame {
      display: none;
      background: rgba(255, 209, 102, 0.14);
      border: 1px solid rgba(255, 209, 102, 0.28);
      border-radius: 18px;
      padding: 10px;
      text-align: center;
      gap: 10px;
    }

    .postgame.show {
      display: grid;
    }

    .postgame-message {
      font-weight: 800;
      color: #fff7d1;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.04); }
    }

    @media (max-width: 420px) {
      :root {
        --board-max: min(92vw, 38vh, 250px);
      }

      .scoreboard {
        grid-template-columns: 1fr;
      }

      .segmented {
        flex-direction: column;
      }

      .segmented label {
        min-width: 0;
        width: 100%;
      }
    }

    @media (max-height: 760px) {
      :root {
        --board-max: min(84vw, 34vh, 270px);
        --section-gap: clamp(6px, 0.8vh, 10px);
      }
    }

    @media (max-height: 680px) {
      :root {
        --board-max: min(80vw, 29vh, 225px);
        --inner-pad: 10px;
      }

      .subtitle {
        display: none;
      }
    }

    @media (max-height: 620px) {
      :root {
        --board-max: min(74vw, 25vh, 190px);
        --grid-gap: 7px;
      }

      .app {
        border-radius: 22px;
      }

      .score-card {
        padding: 6px;
      }

      .primary-action,
      .controls button,
      .postgame-actions button {
        padding: 8px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="screen setup-screen active" id="setupScreen">
      <div class="top">
        <h1>Tic-Tac-Toe</h1>
        <p class="subtitle">Choose your setup once, then play with cleaner restarts and smarter opponents.</p>
      </div>

      <div class="panel options" aria-label="Game settings">
        <div class="option-row">
          <div class="option-label">Mode</div>
          <div class="segmented">
            <input type="radio" id="modeSingle" name="mode" value="single" checked>
            <label for="modeSingle">Single Player</label>

            <input type="radio" id="modeMulti" name="mode" value="multi">
            <label for="modeMulti">Multiplayer</label>
          </div>
        </div>

        <div class="option-row">
          <div class="option-label">Difficulty</div>
          <div class="segmented" id="difficultyGroup">
            <input type="radio" id="difficultyEasy" name="difficulty" value="easy">
            <label for="difficultyEasy">Easy</label>

            <input type="radio" id="difficultyMedium" name="difficulty" value="medium" checked>
            <label for="difficultyMedium">Medium</label>

            <input type="radio" id="difficultyHard" name="difficulty" value="hard">
            <label for="difficultyHard">Impossible</label>
          </div>
        </div>

        <div class="option-row">
          <div class="option-label">Your symbol</div>
          <div class="segmented" id="symbolGroup">
            <input type="radio" id="symbolX" name="playerSymbol" value="X" checked>
            <label for="symbolX">Play as X</label>

            <input type="radio" id="symbolO" name="playerSymbol" value="O">
            <label for="symbolO">Play as O</label>
          </div>
        </div>

        <div class="option-row">
          <div class="option-label">First turn</div>
          <div class="segmented">
            <input type="radio" id="firstHuman" name="firstTurn" value="human" checked>
            <label for="firstHuman">You / X</label>

            <input type="radio" id="firstComputer" name="firstTurn" value="computer">
            <label for="firstComputer">Computer / O</label>
          </div>
        </div>
      </div>

      <button class="primary-action" id="startGameBtn" type="button">Start Game</button>
    </section>

    <section class="screen game-screen" id="gameScreen">
      <div class="game-header">
        <h2 class="game-title">Tic-Tac-Toe</h2>
        <div class="meta" id="gameMeta"></div>
      </div>

      <div class="scoreboard" aria-label="Scoreboard">
        <div class="score-card">
          <div id="scoreLabelX">Player X</div>
          <strong id="scoreX">0</strong>
        </div>
        <div class="score-card">
          <div>Ties</div>
          <strong id="scoreTies">0</strong>
        </div>
        <div class="score-card">
          <div id="scoreLabelO">Player O</div>
          <strong id="scoreO">0</strong>
        </div>
      </div>

      <div class="micro-stats">
        <div class="micro-card" id="streakCard">Win streak: 0</div>
        <div class="micro-card" id="roundCard">Round: 1</div>
      </div>

      <p class="status" id="status" aria-live="polite"></p>

      <div class="board-area">
        <div class="grid" id="grid" role="grid" aria-label="Tic Tac Toe board"></div>
      </div>

      <div class="postgame" id="postgameBox">
        <div class="postgame-message" id="postgameMessage"></div>
        <div class="postgame-actions">
          <button class="btn-primary" id="playAgainBtn" type="button">Play Again</button>
        </div>
      </div>

      <div class="controls">
        <button class="btn-primary" id="restartSameBtn" type="button">Restart With Same Settings</button>
        <button class="btn-secondary" id="changeSettingsBtn" type="button">Change Settings</button>
        <button class="btn-tertiary" id="undoBtn" type="button">Undo</button>
        <button class="btn-tertiary" id="resetScoresBtn" type="button">Reset Scores</button>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "tic-tac-toe-settings-v2";

    const WINNING_LINES = [
      [0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6]
    ];

    const MOVE_PRIORITY = [4, 0, 2, 6, 8, 1, 3, 5, 7];
    const CORNERS = [0, 2, 6, 8];
    const EDGES = [1, 3, 5, 7];

    const defaults = {
      mode: "single",
      difficulty: "medium",
      playerSymbol: "X",
      firstTurn: "human"
    };

    const state = {
      board: Array(9).fill(""),
      currentPlayer: "X",
      gameOver: false,
      winningLine: null,
      isComputerThinking: false,
      scores: { X: 0, O: 0, ties: 0 },
      roundNumber: 1,
      playerWinStreak: 0,
      history: [],
      settings: { ...defaults }
    };

    const elements = {
      setupScreen: document.getElementById("setupScreen"),
      gameScreen: document.getElementById("gameScreen"),
      startGameBtn: document.getElementById("startGameBtn"),
      restartSameBtn: document.getElementById("restartSameBtn"),
      changeSettingsBtn: document.getElementById("changeSettingsBtn"),
      resetScoresBtn: document.getElementById("resetScoresBtn"),
      playAgainBtn: document.getElementById("playAgainBtn"),
      undoBtn: document.getElementById("undoBtn"),
      grid: document.getElementById("grid"),
      status: document.getElementById("status"),
      gameMeta: document.getElementById("gameMeta"),
      scoreX: document.getElementById("scoreX"),
      scoreO: document.getElementById("scoreO"),
      scoreTies: document.getElementById("scoreTies"),
      scoreLabelX: document.getElementById("scoreLabelX"),
      scoreLabelO: document.getElementById("scoreLabelO"),
      streakCard: document.getElementById("streakCard"),
      roundCard: document.getElementById("roundCard"),
      postgameBox: document.getElementById("postgameBox"),
      postgameMessage: document.getElementById("postgameMessage"),
      modeInputs: document.querySelectorAll('input[name="mode"]'),
      difficultyInputs: document.querySelectorAll('input[name="difficulty"]'),
      difficultyGroup: document.getElementById("difficultyGroup"),
      symbolInputs: document.querySelectorAll('input[name="playerSymbol"]'),
      symbolGroup: document.getElementById("symbolGroup")
    };

    const cells = [];

    function createBoard() {
      for (let i = 0; i < 9; i += 1) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "cell";
        button.setAttribute("role", "gridcell");
        button.setAttribute("aria-label", `Cell ${i + 1}`);
        button.addEventListener("click", () => handleCellClick(i));
        elements.grid.appendChild(button);
        cells.push(button);
      }
    }

    function showScreen(name) {
      elements.setupScreen.classList.toggle("active", name === "setup");
      elements.gameScreen.classList.toggle("active", name === "game");
    }

    function getInputValue(name) {
      return document.querySelector(`input[name="${name}"]:checked`).value;
    }

    function setInputValue(name, value) {
      const input = document.querySelector(`input[name="${name}"][value="${value}"]`);
      if (input) input.checked = true;
    }

    function saveSettings() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.settings));
    }

    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!saved) return;
        state.settings = { ...defaults, ...saved };
      } catch {
        state.settings = { ...defaults };
      }
    }

    function syncSettingsFromInputs() {
      state.settings.mode = getInputValue("mode");
      state.settings.difficulty = getInputValue("difficulty");
      state.settings.playerSymbol = getInputValue("playerSymbol");
      state.settings.firstTurn = getInputValue("firstTurn");
      saveSettings();
    }

    function applySettingsToInputs() {
      setInputValue("mode", state.settings.mode);
      setInputValue("difficulty", state.settings.difficulty);
      setInputValue("playerSymbol", state.settings.playerSymbol);
      setInputValue("firstTurn", state.settings.firstTurn);
    }

    function refreshSettingsUI() {
      const isSingle = getInputValue("mode") === "single";
      const symbol = getInputValue("playerSymbol");

      elements.difficultyInputs.forEach(input => {
        input.disabled = !isSingle;
      });

      elements.symbolInputs.forEach(input => {
        input.disabled = !isSingle;
      });

      elements.difficultyGroup.style.opacity = isSingle ? "1" : "0.55";
      elements.symbolGroup.style.opacity = isSingle ? "1" : "0.55";

      if (isSingle) {
        document.querySelector('label[for="firstHuman"]').textContent = symbol === "X" ? "You / X" : "You / O";
        document.querySelector('label[for="firstComputer"]').textContent = symbol === "X" ? "Computer / O" : "Computer / X";
      } else {
        document.querySelector('label[for="firstHuman"]').textContent = "Player X";
        document.querySelector('label[for="firstComputer"]').textContent = "Player O";
      }
    }

    function getHumanSymbol() {
      return state.settings.mode === "single" ? state.settings.playerSymbol : null;
    }

    function getComputerSymbol() {
      if (state.settings.mode !== "single") return null;
      return getHumanSymbol() === "X" ? "O" : "X";
    }

    function getStartingSymbol() {
      if (state.settings.mode === "multi") {
        return state.settings.firstTurn === "human" ? "X" : "O";
      }

      return state.settings.firstTurn === "human" ? getHumanSymbol() : getComputerSymbol();
    }

    function isComputerTurn() {
      return state.settings.mode === "single" && state.currentPlayer === getComputerSymbol();
    }

    function getAvailableMoves(board = state.board) {
      return board.reduce((moves, cell, index) => {
        if (cell === "") moves.push(index);
        return moves;
      }, []);
    }

    function preferredMoveOrder(moves) {
      return [...moves].sort((a, b) => MOVE_PRIORITY.indexOf(a) - MOVE_PRIORITY.indexOf(b));
    }

    function evaluateBoard(board = state.board) {
      for (const line of WINNING_LINES) {
        const [a, b, c] = line;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line };
        }
      }

      if (board.every(cell => cell !== "")) {
        return { winner: "Tie", line: null };
      }

      return { winner: null, line: null };
    }

    function countImmediateWins(board, symbol) {
      let count = 0;
      for (const move of getAvailableMoves(board)) {
        const nextBoard = [...board];
        nextBoard[move] = symbol;
        if (evaluateBoard(nextBoard).winner === symbol) count += 1;
      }
      return count;
    }

    function findImmediateMove(symbol, board = state.board) {
      for (const move of preferredMoveOrder(getAvailableMoves(board))) {
        const nextBoard = [...board];
        nextBoard[move] = symbol;
        if (evaluateBoard(nextBoard).winner === symbol) return move;
      }
      return null;
    }

    function findForkMove(symbol, board = state.board) {
      for (const move of preferredMoveOrder(getAvailableMoves(board))) {
        const nextBoard = [...board];
        nextBoard[move] = symbol;
        if (countImmediateWins(nextBoard, symbol) >= 2) return move;
      }
      return null;
    }

    function blockForkMove(symbolToBlock, aiSymbol, board = state.board) {
      const available = preferredMoveOrder(getAvailableMoves(board));
      const opponentForks = [];

      for (const move of available) {
        const nextBoard = [...board];
        nextBoard[move] = symbolToBlock;
        if (countImmediateWins(nextBoard, symbolToBlock) >= 2) {
          opponentForks.push(move);
        }
      }

      if (!opponentForks.length) return null;
      if (opponentForks.length === 1) return opponentForks[0];

      for (const move of available) {
        const nextBoard = [...board];
        nextBoard[move] = aiSymbol;

        if (evaluateBoard(nextBoard).winner === aiSymbol) return move;
        if (countImmediateWins(nextBoard, symbolToBlock) === 0) return move;
      }

      return opponentForks[0];
    }

    function getOppositeCorner(playerSymbol, board = state.board) {
      const pairs = [
        [0, 8],
        [2, 6],
        [6, 2],
        [8, 0]
      ];

      for (const [playerCorner, oppositeCorner] of pairs) {
        if (board[playerCorner] === playerSymbol && board[oppositeCorner] === "") {
          return oppositeCorner;
        }
      }

      return null;
    }

    function getAnyCorner(board = state.board) {
      return CORNERS.find(index => board[index] === "") ?? null;
    }

    function getAnyEdge(board = state.board) {
      return EDGES.find(index => board[index] === "") ?? null;
    }

    function chooseStrategicMove(aiSymbol, humanSymbol, board = state.board) {
      const win = findImmediateMove(aiSymbol, board);
      if (win !== null) return win;

      const block = findImmediateMove(humanSymbol, board);
      if (block !== null) return block;

      const fork = findForkMove(aiSymbol, board);
      if (fork !== null) return fork;

      const blockFork = blockForkMove(humanSymbol, aiSymbol, board);
      if (blockFork !== null) return blockFork;

      if (board[4] === "") return 4;

      const oppositeCorner = getOppositeCorner(humanSymbol, board);
      if (oppositeCorner !== null) return oppositeCorner;

      const corner = getAnyCorner(board);
      if (corner !== null) return corner;

      const edge = getAnyEdge(board);
      if (edge !== null) return edge;

      return null;
    }

    function minimax(board, currentSymbol, aiSymbol, humanSymbol, depth = 0) {
      const result = evaluateBoard(board);

      if (result.winner === aiSymbol) return { score: 10 - depth, move: null };
      if (result.winner === humanSymbol) return { score: depth - 10, move: null };
      if (result.winner === "Tie") return { score: 0, move: null };

      const maximizing = currentSymbol === aiSymbol;
      let bestScore = maximizing ? -Infinity : Infinity;
      let bestMove = null;

      for (const move of preferredMoveOrder(getAvailableMoves(board))) {
        const nextBoard = [...board];
        nextBoard[move] = currentSymbol;
        const next = minimax(
          nextBoard,
          currentSymbol === "X" ? "O" : "X",
          aiSymbol,
          humanSymbol,
          depth + 1
        );

        if (maximizing ? next.score > bestScore : next.score < bestScore) {
          bestScore = next.score;
          bestMove = move;
        }
      }

      return { score: bestScore, move: bestMove };
    }

    function randomChoice(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function scoreHumanLikeMove(move, aiSymbol, humanSymbol, board = state.board) {
      const nextBoard = [...board];
      nextBoard[move] = aiSymbol;

      if (evaluateBoard(nextBoard).winner === aiSymbol) return 100;
      if (countImmediateWins(nextBoard, humanSymbol) >= 2) return -100;
      if (findImmediateMove(humanSymbol, nextBoard) !== null) return -60;

      let score = 0;

      if (move === 4) score += 16;
      if (CORNERS.includes(move)) score += 10;
      if (EDGES.includes(move)) score += 5;

      if (countImmediateWins(nextBoard, aiSymbol) >= 1) score += 18;
      if (findForkMove(aiSymbol, nextBoard) !== null) score += 20;

      const oppFork = findForkMove(humanSymbol, nextBoard);
      if (oppFork === null) score += 12;
      else score -= 18;

      const strategic = chooseStrategicMove(aiSymbol, humanSymbol, board);
      if (strategic === move) score += 10;

      return score;
    }

    function getSmartButImperfectMove(aiSymbol, humanSymbol) {
      const available = preferredMoveOrder(getAvailableMoves());
      const scored = available
        .map(move => ({ move, score: scoreHumanLikeMove(move, aiSymbol, humanSymbol) }))
        .sort((a, b) => b.score - a.score);

      const safeMoves = scored.filter(item => item.score > -20);
      const pool = safeMoves.length ? safeMoves : scored;

      if (Math.random() < 0.7) return pool[0].move;

      const topBand = pool.filter(item => item.score >= pool[0].score - 10);
      return randomChoice(topBand).move;
    }

    function getMediumMove(aiSymbol, humanSymbol) {
      const win = findImmediateMove(aiSymbol);
      if (win !== null) return win;

      const block = findImmediateMove(humanSymbol);
      if (block !== null) return block;

      const fork = findForkMove(aiSymbol);
      if (fork !== null) return fork;

      const blockFork = blockForkMove(humanSymbol, aiSymbol);
      if (blockFork !== null) return blockFork;

      const available = preferredMoveOrder(getAvailableMoves());
      const scored = available
        .map(move => ({ move, score: scoreHumanLikeMove(move, aiSymbol, humanSymbol) }))
        .sort((a, b) => b.score - a.score);

      const safePool = scored.filter(item => item.score >= scored[0].score - 8 && item.score > -10);
      const choicePool = safePool.length ? safePool : scored;

      if (Math.random() < 0.6) return choicePool[0].move;

      const topChoices = choicePool.slice(0, Math.min(3, choicePool.length));
      return randomChoice(topChoices).move;
    }

    function getComputerMove() {
      const available = preferredMoveOrder(getAvailableMoves());
      if (!available.length) return null;

      const difficulty = state.settings.difficulty;
      const aiSymbol = getComputerSymbol();
      const humanSymbol = getHumanSymbol();

      if (difficulty === "easy") return getSmartButImperfectMove(aiSymbol, humanSymbol);
      if (difficulty === "medium") return getMediumMove(aiSymbol, humanSymbol);

      return minimax([...state.board], aiSymbol, aiSymbol, humanSymbol).move;
    }

    function setStatus(message, thinking = false) {
      if (thinking) {
        elements.status.innerHTML = `<span class="thinking">${message}<span class="dots"><span></span><span></span><span></span></span></span>`;
      } else {
        elements.status.textContent = message;
      }
    }

    function updateMeta() {
      const { mode, difficulty, firstTurn, playerSymbol } = state.settings;

      if (mode === "single") {
        const computerSymbol = playerSymbol === "X" ? "O" : "X";
        elements.gameMeta.textContent =
          `Single Player • ${difficulty[0].toUpperCase() + difficulty.slice(1)} • You: ${playerSymbol} • Computer: ${computerSymbol} • ${firstTurn === "human" ? "You start" : "Computer starts"}`;
        elements.scoreLabelX.textContent = playerSymbol === "X" ? "You" : "Computer";
        elements.scoreLabelO.textContent = playerSymbol === "O" ? "You" : "Computer";
      } else {
        elements.gameMeta.textContent = `Multiplayer • ${firstTurn === "human" ? "Player X starts" : "Player O starts"}`;
        elements.scoreLabelX.textContent = "Player X";
        elements.scoreLabelO.textContent = "Player O";
      }
    }

    function renderScores() {
      elements.scoreX.textContent = state.scores.X;
      elements.scoreO.textContent = state.scores.O;
      elements.scoreTies.textContent = state.scores.ties;
      elements.streakCard.textContent =
        state.settings.mode === "single"
          ? `Win streak: ${state.playerWinStreak}`
          : "Win streak: N/A";
      elements.roundCard.textContent = `Round: ${state.roundNumber}`;
    }

    function renderBoard() {
      cells.forEach((cell, index) => {
        const value = state.board[index];
        const isWinning = state.winningLine && state.winningLine.includes(index);
        const disabled = state.gameOver || state.isComputerThinking || value !== "";

        cell.textContent = value;
        cell.disabled = disabled;
        cell.classList.toggle("x", value === "X");
        cell.classList.toggle("o", value === "O");
        cell.classList.toggle("winning", Boolean(isWinning));
        cell.setAttribute("aria-label", value ? `${value} in cell ${index + 1}` : `Empty cell ${index + 1}`);
      });

      elements.undoBtn.disabled = state.settings.mode === "single" || state.history.length === 0 || state.isComputerThinking;
    }

    function showPostgame(message = "") {
      elements.postgameMessage.textContent = message;
      elements.postgameBox.classList.add("show");
    }

    function hidePostgame() {
      elements.postgameBox.classList.remove("show");
      elements.postgameMessage.textContent = "";
    }

    function updateTurnStatus() {
      if (state.gameOver) return;

      if (state.settings.mode === "multi") {
        setStatus(`Player ${state.currentPlayer}'s turn.`);
      } else if (state.currentPlayer === getHumanSymbol()) {
        setStatus(`Your turn. You are ${getHumanSymbol()}.`);
      } else {
        setStatus("Computer is thinking", true);
      }
    }

    function snapshotHistory() {
      state.history.push({
        board: [...state.board],
        currentPlayer: state.currentPlayer,
        gameOver: state.gameOver,
        winningLine: state.winningLine ? [...state.winningLine] : null
      });
    }

    function applyMove(index, symbol, saveHistory = true) {
      if (state.board[index] !== "" || state.gameOver) return false;
      if (saveHistory) snapshotHistory();
      state.board[index] = symbol;
      return true;
    }

    function finishRound(winner, line) {
      state.gameOver = true;
      state.winningLine = line;

      let message = "";

      if (winner === "Tie") {
        state.scores.ties += 1;
        state.playerWinStreak = 0;
        message = "It's a tie.";
      } else {
        state.scores[winner] += 1;

        if (state.settings.mode === "single") {
          if (winner === getHumanSymbol()) {
            state.playerWinStreak += 1;
            message = "You win.";
          } else {
            state.playerWinStreak = 0;
            message = "Computer wins.";
          }
        } else {
          message = `Player ${winner} wins.`;
        }
      }

      setStatus(message);
      showPostgame(message + " Play again?");
      renderScores();
      renderBoard();
    }

    function checkRoundState() {
      const { winner, line } = evaluateBoard();
      if (!winner) return false;
      finishRound(winner, line);
      return true;
    }

    function triggerComputerTurn() {
      if (!isComputerTurn() || state.gameOver) return;

      state.isComputerThinking = true;
      renderBoard();
      updateTurnStatus();

      const delay = state.board.filter(Boolean).length <= 1 ? 360 : 220;

      setTimeout(() => {
        if (!state.isComputerThinking) return;

        const move = getComputerMove();
        state.isComputerThinking = false;

        if (move === null || state.gameOver) {
          renderBoard();
          return;
        }

        applyMove(move, getComputerSymbol(), false);
        renderBoard();

        if (checkRoundState()) return;

        state.currentPlayer = getHumanSymbol();
        updateTurnStatus();
        renderBoard();
      }, delay);
    }

    function handleCellClick(index) {
      if (state.gameOver || state.isComputerThinking) return;
      if (state.board[index] !== "") return;

      applyMove(index, state.currentPlayer);
      renderBoard();

      if (checkRoundState()) return;

      state.currentPlayer = state.currentPlayer === "X" ? "O" : "X";
      updateTurnStatus();
      renderBoard();

      if (isComputerTurn()) {
        triggerComputerTurn();
      }
    }

    function resetBoard({ advanceRound = true } = {}) {
      if (advanceRound) state.roundNumber += 1;

      state.board = Array(9).fill("");
      state.gameOver = false;
      state.winningLine = null;
      state.isComputerThinking = false;
      state.history = [];
      state.currentPlayer = getStartingSymbol();

      hidePostgame();
      updateMeta();
      renderScores();
      renderBoard();
      updateTurnStatus();

      if (isComputerTurn()) {
        triggerComputerTurn();
      }
    }

    function startGameFromSettings() {
      syncSettingsFromInputs();
      state.roundNumber = 1;
      state.playerWinStreak = 0;
      state.scores = { X: 0, O: 0, ties: 0 };
      showScreen("game");
      resetBoard({ advanceRound: false });
    }

    function restartSameSettings() {
      resetBoard();
    }

    function playAgain() {
      resetBoard();
    }

    function changeSettings() {
      state.isComputerThinking = false;
      showScreen("setup");
      applySettingsToInputs();
      refreshSettingsUI();
    }

    function resetScores() {
      state.scores = { X: 0, O: 0, ties: 0 };
      state.playerWinStreak = 0;
      state.roundNumber = 1;
      renderScores();
    }

    function undoMove() {
      if (state.settings.mode !== "multi" || state.history.length === 0 || state.isComputerThinking) return;

      const previous = state.history.pop();
      state.board = [...previous.board];
      state.currentPlayer = previous.currentPlayer;
      state.gameOver = previous.gameOver;
      state.winningLine = previous.winningLine ? [...previous.winningLine] : null;
      hidePostgame();
      updateTurnStatus();
      renderBoard();
    }

    function attachListeners() {
      [
        ...elements.modeInputs,
        ...elements.difficultyInputs,
        ...elements.symbolInputs,
        ...document.querySelectorAll('input[name="firstTurn"]')
      ].forEach(input => {
        input.addEventListener("change", refreshSettingsUI);
      });

      elements.startGameBtn.addEventListener("click", startGameFromSettings);
      elements.restartSameBtn.addEventListener("click", restartSameSettings);
      elements.playAgainBtn.addEventListener("click", playAgain);
      elements.changeSettingsBtn.addEventListener("click", changeSettings);
      elements.resetScoresBtn.addEventListener("click", resetScores);
      elements.undoBtn.addEventListener("click", undoMove);
    }

    createBoard();
    loadSettings();
    applySettingsToInputs();
    attachListeners();
    refreshSettingsUI();
    renderScores();
  </script>
</body>
</html>
